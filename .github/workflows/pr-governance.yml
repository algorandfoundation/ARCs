name: PR governance

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

permissions:
  contents: read

jobs:
  arc-process-check:
    name: arc-process-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Checkout trusted base branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Run ARC process checks
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const module = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/pr-governance.mjs`);
            await module.runProcessCheck({ github, context, core });

  auto-label:
    name: auto-label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout trusted base branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Apply area and kind labels
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const module = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/pr-governance.mjs`);
            await module.runAutoLabel({ github, context, core });
