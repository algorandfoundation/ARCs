name: arckit release
on:
  push:
    tags:
      - "arckit/v*"
permissions:
  contents: read
env:
  GO_VERSION: "1.26.1"
  GOCACHE: /tmp/arckit-go-cache
  GOMODCACHE: /tmp/arckit-go-mod-cache
jobs:
  release:
    name: arckit-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Verify tag commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"
      - name: Build release archives
        id: build
        run: |
          chmod +x .github/scripts/build-arckit-release.sh
          RELEASE_DIR="$(.github/scripts/build-arckit-release.sh "${RUNNER_TEMP}/arckit-release" "${GITHUB_REF_NAME}")"
          echo "release_dir=${RELEASE_DIR}" >> "${GITHUB_OUTPUT}"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${{ steps.build.outputs.release_dir }}"/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
