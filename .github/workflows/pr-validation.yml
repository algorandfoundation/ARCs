name: PR validation
on:
  pull_request:
permissions:
  contents: read
env:
  GO_VERSION: "1.26.1"
  PYTHON_VERSION: "3.12"
  PRE_COMMIT_VERSION: "4.4.0"
  GOCACHE: /tmp/arckit-go-cache
  GOMODCACHE: /tmp/arckit-go-mod-cache
jobs:
  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pre-commit==${PRE_COMMIT_VERSION}"
      - name: Run hygiene checks
        run: |
          pre-commit run --from-ref "${{ github.event.pull_request.base.sha }}" --to-ref "${{ github.event.pull_request.head.sha }}" --show-diff-on-failure
  arckit-tool:
    name: arckit-tool
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Detect relevant changes
        id: changes
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'arckit/**' '.github/workflows/**' | grep -q .; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Skip irrelevant changes
        if: steps.changes.outputs.run != 'true'
        run: echo "No arckit or workflow changes detected."
      - name: Verify gofmt
        if: steps.changes.outputs.run == 'true'
        run: |
          cd arckit
          DIFF="$(find . -name '*.go' -print0 | xargs -0 gofmt -d -s)"
          if [[ -n "${DIFF}" ]]; then
            echo "${DIFF}"
            exit 1
          fi
      - name: Run go vet
        if: steps.changes.outputs.run == 'true'
        run: |
          cd arckit
          go vet ./...
      - name: Run go test
        if: steps.changes.outputs.run == 'true'
        run: |
          cd arckit
          go test ./...
      - name: Run go build
        if: steps.changes.outputs.run == 'true'
        run: |
          cd arckit
          go build ./cmd/arckit
      - name: Dry-run release packaging
        if: steps.changes.outputs.run == 'true'
        run: |
          chmod +x .github/scripts/build-arckit-release.sh
          RELEASE_DIR="$(.github/scripts/build-arckit-release.sh "${RUNNER_TEMP}/arckit-release" "v0.0.0-dev")"
          test -f "${RELEASE_DIR}/SHA256SUMS"
  repo-validate-offline:
    name: repo-validate-offline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Detect relevant changes
        id: changes
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'ARCs/**' 'adoption/**' 'templates/**' 'arckit/**' | grep -q .; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Skip irrelevant changes
        if: steps.changes.outputs.run != 'true'
        run: echo "No ARC, adoption, template, or arckit changes detected."
      - name: Build arckit
        if: steps.changes.outputs.run == 'true'
        run: |
          cd arckit
          go build -o "${RUNNER_TEMP}/arckit" ./cmd/arckit
      - name: Validate repository offline
        if: steps.changes.outputs.run == 'true'
        run: |
          "${RUNNER_TEMP}/arckit" validate repo .
      - name: Detect changed ARC files
        if: steps.changes.outputs.run == 'true'
        id: changed_arcs
        run: |
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'ARCs/*.md' | grep -E '^ARCs/arc-[0-9]{4}\.md$' > "${RUNNER_TEMP}/changed-arcs.txt" || true
          if [[ -s "${RUNNER_TEMP}/changed-arcs.txt" ]]; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Enforce canonical YAML front matter on changed ARC files
        if: steps.changed_arcs.outputs.run == 'true'
        run: |
          while IFS= read -r path; do
            "${RUNNER_TEMP}/arckit" validate arc --enforce-rule R:021 "${path}"
          done < "${RUNNER_TEMP}/changed-arcs.txt"
  online-validation:
    name: online-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pre-commit==${PRE_COMMIT_VERSION}"
      - name: Validate repository online
        id: online
        continue-on-error: true
        run: |
          set +e
          node .github/scripts/lychee_report.mjs --from-ref "${{ github.event.pull_request.base.sha }}" --to-ref "${{ github.event.pull_request.head.sha }}" --report "${RUNNER_TEMP}/online.json"
          echo "exit_code=$?" >> "${GITHUB_OUTPUT}"
          exit 0
      - name: Summarize online validation
        if: always()
        env:
          ONLINE_REPORT_PATH: ${{ runner.temp }}/online.json
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path(os.environ["ONLINE_REPORT_PATH"])
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          if not report_path.exists():
              with summary_path.open("a", encoding="utf-8") as fh:
                  fh.write("## Online validation\n\n")
                  fh.write("No online validation report was produced.\n")
              raise SystemExit(0)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          diagnostics = report.get("diagnostics", [])
          summary = report.get("summary", {})
          warnings = summary.get("warnings", 0)
          errors = summary.get("errors", 0)
          info = summary.get("info", 0)

          with summary_path.open("a", encoding="utf-8") as fh:
              fh.write("## Online validation\n\n")
              fh.write("This check is advisory and does not block the PR because external link availability is network-dependent.\n\n")
              fh.write(f"- Exit code: `{report.get('exit_code', 0)}`\n")
              fh.write(f"- Diagnostics: `{errors}` error(s), `{warnings}` warning(s), `{info}` info\n")
              if diagnostics:
                  fh.write("\n### Sample findings\n\n")
                  for diagnostic in diagnostics[:10]:
                      message = diagnostic.get("message", "lychee reported a link issue")
                      fh.write(f"- {message}\n")
                  remaining = len(diagnostics) - min(len(diagnostics), 10)
                  if remaining > 0:
                      fh.write(f"- ... and {remaining} more\n")
              else:
                  fh.write("\nNo broken-link diagnostics were reported.\n")
          PY
